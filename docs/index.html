<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackPrice — Historial de precios MercadoLibre</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    header .logo { font-size: 28px; }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    header span { font-size: 13px; opacity: 0.6; margin-left: auto; }

    .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.2s ease;
    }

    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .card.active { border-color: #3b82f6; background: #eff6ff; }

    .card .nombre {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .card .precio {
      font-size: 26px;
      font-weight: 800;
      color: #1a1a2e;
    }

    .card .precio span { font-size: 16px; font-weight: 600; color: #6b7280; }

    .card .fecha {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .chart-section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .chart-section h2 {
      font-size: 16px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 20px;
    }

    .chart-wrapper { position: relative; height: 300px; }

    .estado {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 15px;
    }

    .badge-ml {
      display: inline-block;
      background: #ffe600;
      color: #1a1a2e;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 8px;
      text-decoration: none;
    }

    .badge-ml:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <span class="logo">📈</span>
  <h1>TrackPrice</h1>
  <span>Historial de precios · MercadoLibre Argentina</span>
</header>

<div class="container">
  <div class="productos-grid" id="productos-grid">
    <div class="estado">Cargando productos...</div>
  </div>

  <div class="chart-section" id="chart-section" style="display:none">
    <h2 id="chart-titulo">Historial de precio</h2>
    <div class="chart-wrapper">
      <canvas id="chart"></canvas>
    </div>
  </div>
</div>

<script>
  const API = "https://trackprice-xw0u.onrender.com";
  let chartInstance = null;

  async function cargarProductos() {
    const grid = document.getElementById("productos-grid");
    try {
      const res = await fetch(`${API}/productos`);
      const productos = await res.json();

      if (!productos.length) {
        grid.innerHTML = '<div class="estado">Sin productos aún.</div>';
        return;
      }

      grid.innerHTML = "";
      productos.forEach((p, i) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="nombre">${p.nombre}</div>
          <div class="precio"><span>$</span>${Number(p.precio_actual).toLocaleString("es-AR")}</div>
          <div class="fecha">Actualizado: ${formatFecha(p.ultima_actualizacion)}</div>
          <a class="badge-ml" href="${p.url}" target="_blank">Ver en MercadoLibre ↗</a>
        `;
        card.addEventListener("click", () => {
          document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");
          cargarHistorial(p.id, p.nombre);
        });
        grid.appendChild(card);
        if (i === 0) {
          card.classList.add("active");
          cargarHistorial(p.id, p.nombre);
        }
      });
    } catch (e) {
      grid.innerHTML = `<div class="estado">Error cargando datos: ${e.message}</div>`;
    }
  }

  async function cargarHistorial(id, nombre) {
    const section = document.getElementById("chart-section");
    const titulo = document.getElementById("chart-titulo");
    section.style.display = "block";
    titulo.textContent = `Historial: ${nombre}`;

    try {
      const res = await fetch(`${API}/productos/${id}/historial`);
      const data = await res.json();

      const labels = data.map(h => formatFecha(h.fecha)).reverse();
      const precios = data.map(h => h.precio).reverse();

      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Precio (ARS)",
            data: precios,
            borderColor: "#3b82f6",
            backgroundColor: "rgba(59,130,246,0.08)",
            borderWidth: 2.5,
            pointRadius: 5,
            pointBackgroundColor: "#3b82f6",
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `$${Number(ctx.raw).toLocaleString("es-AR")}`
              }
            }
          },
          scales: {
            y: {
              ticks: {
                callback: v => `$${Number(v).toLocaleString("es-AR")}`
              },
              grid: { color: "rgba(0,0,0,0.05)" }
            },
            x: {
              grid: { display: false }
            }
          }
        }
      });
    } catch (e) {
      titulo.textContent += ` — Error: ${e.message}`;
    }
  }

  function formatFecha(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("es-AR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
  }

  cargarProductos();
</script>

</body>
</html>
