services:
  - type: web
    name: trackprice
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trackprice-db
          property: connectionString

  - type: cron
    name: trackprice-scraper
    runtime: python
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler/runner.py --once
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trackprice-db
          property: connectionString

databases:
  - name: trackprice-db
    plan: free
