services:
  - type: web
    name: trackprice
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trackprice-db
          property: connectionString

databases:
  - name: trackprice-db
    plan: free
