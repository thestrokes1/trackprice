name: Scrape prices

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraper
        run: |
          curl -s -X POST "${{ secrets.API_URL }}/scrape" \
            -H "x-api-key: ${{ secrets.SCRAPE_API_KEY }}" \
            -H "Content-Type: application/json"
